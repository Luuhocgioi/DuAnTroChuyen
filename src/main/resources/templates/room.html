<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title th:text="${room.tenRoom}">Chat Room</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1013; --surface: #16181d; --border: #22252e;
    --accent: #d4f53c; --text: #e8eaf0; --muted: #6b7280; --hover: #1e2128;
    --me-bubble: #1e2a06; --me-border: rgba(212,245,60,0.25); --other-bubble: #1a1c22;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }
  .layout { display: grid; grid-template-columns: 240px 1fr; height: 100vh; }

  /* SIDEBAR */
  .sidebar { background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 28px 16px; gap: 4px; height: 100vh; overflow-y: auto; }
  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; padding: 0 12px 20px; border-bottom: 1px solid var(--border); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; text-decoration: none; color: var(--text); }
  .logo-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; }
  .user-block { padding: 12px; border-radius: 10px; background: var(--hover); margin-bottom: 8px; }
  .user-block .label { font-size: 10px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 3px; }
  .user-block .mssv { font-size: 12px; color: var(--accent); font-weight: 500; }
  .user-block .name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; }
  .nav-label { font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; padding: 12px 12px 4px; }
  .nav-link { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px; color: var(--muted); text-decoration: none; font-size: 13px; font-weight: 500; transition: background 0.15s, color 0.15s; }
  .nav-link:hover { background: var(--hover); color: var(--text); }
  .nav-link.active { background: rgba(212,245,60,0.08); color: var(--accent); border-left: 2px solid var(--accent); padding-left: 10px; }
  .nav-link.active-private { background: rgba(56,217,245,0.08); color: #38d9f5; border-left: 2px solid #38d9f5; padding-left: 10px; }
  .nav-link .icon { font-size: 14px; width: 20px; text-align: center; flex-shrink: 0; }
  .nav-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .unread-badge { min-width: 18px; height: 18px; padding: 0 5px; border-radius: 999px; background: #f87171; color: #0f1013; font-size: 11px; font-weight: 800; display: none; align-items: center; justify-content: center; flex-shrink: 0; }
  .unread-badge.show { display: inline-flex; }
  .presence-state { font-size: 10px; font-weight: 700; text-transform: uppercase; flex-shrink: 0; }
  .presence-state.online { color: #4ade80; }
  .presence-state.offline { color: #6b7280; }
  .nav-link.has-unread { background: rgba(248,113,113,0.1); color: var(--text); }
  .spacer { flex: 1; }
  .online-badge { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--muted); border-top: 1px solid var(--border); padding-top: 16px; margin-top: 4px; }
  .online-badge .dot { width: 6px; height: 6px; background: #4ade80; border-radius: 50%; }

  /* CHAT */
  .chat-area { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
  .chat-header { padding: 0 28px; height: 60px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 14px; flex-shrink: 0; background: var(--surface); }
  .chat-header .hash { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 22px; color: var(--accent); }
  .chat-header .room-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; }
  .header-status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); margin-left: auto; }
  .header-status .dot { width: 6px; height: 6px; background: #4ade80; border-radius: 50%; }

  /* MESSAGES */
  #messages { flex: 1; overflow-y: auto; padding: 24px 28px; display: flex; flex-direction: column; gap: 4px; }
  .date-divider { display: flex; align-items: center; gap: 12px; margin: 16px 0 8px; }
  .date-divider span { font-size: 11px; color: var(--muted); white-space: nowrap; }
  .date-divider::before, .date-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .msg-row { display: flex; flex-direction: column; max-width: 65%; gap: 3px; animation: msgIn 0.18s ease; }
  .msg-row.me { align-self: flex-end; align-items: flex-end; }
  .msg-row.other { align-self: flex-start; align-items: flex-start; }
  .msg-row + .msg-row { margin-top: 2px; }
  .msg-row.gap-top { margin-top: 12px; }
  .msg-sender { font-size: 11px; color: var(--muted); font-weight: 500; padding: 0 4px; }
  .msg-bubble { padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.55; word-break: break-word; }
  .msg-row.me .msg-bubble { background: var(--me-bubble); border: 1px solid var(--me-border); border-bottom-right-radius: 4px; color: #dff59a; }
  .msg-row.other .msg-bubble { background: var(--other-bubble); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

  /* ẢNH — có nút download hover */
  .msg-image-wrap {
    position: relative;
    display: inline-block;
    border-radius: 10px;
    overflow: hidden;
  }
  .msg-image { max-width: 280px; max-height: 200px; border-radius: 10px; display: block; border: 1px solid var(--border); cursor: pointer; transition: opacity 0.15s; }
  .msg-image:hover { opacity: 0.85; }
  .img-download-btn {
    position: absolute;
    bottom: 8px; right: 8px;
    background: rgba(0,0,0,0.65);
    color: #fff;
    border: none; border-radius: 6px;
    padding: 4px 8px;
    font-size: 12px; font-family: 'Inter', sans-serif;
    cursor: pointer;
    text-decoration: none;
    display: flex; align-items: center; gap: 4px;
    opacity: 0;
    transition: opacity 0.15s;
    backdrop-filter: blur(4px);
  }
  .msg-image-wrap:hover .img-download-btn { opacity: 1; }

  /* FILE */
  .msg-file {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px; border-radius: 12px;
    background: var(--hover); border: 1px solid var(--border);
    text-decoration: none; color: var(--text);
    font-size: 13px; transition: border-color 0.15s;
    max-width: 300px;
  }
  .msg-file:hover { border-color: rgba(212,245,60,0.3); }
  .msg-file .file-icon { font-size: 24px; flex-shrink: 0; }
  .msg-file .file-info { flex: 1; overflow: hidden; }
  .msg-file .file-name { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
  .msg-file .file-sub { font-size: 11px; color: var(--muted); }
  .msg-file .file-dl {
    width: 30px; height: 30px; border-radius: 7px;
    background: rgba(212,245,60,0.1); border: 1px solid rgba(212,245,60,0.2);
    display: flex; align-items: center; justify-content: center;
    color: var(--accent); font-size: 14px; flex-shrink: 0;
    text-decoration: none; transition: background 0.15s;
  }
  .msg-file .file-dl:hover { background: rgba(212,245,60,0.2); }

  .msg-time { font-size: 10px; color: var(--muted); padding: 0 4px; }
  .seen-marker { font-size: 10px; color: #38d9f5; padding: 0 4px; display: none; }
  .seen-marker.show { display: block; }
  .presence-dot { display: inline-block; width: 8px; height: 8px; background: #6b7280; border-radius: 50%; flex-shrink: 0; }
  .presence-dot.online { background: #4ade80; box-shadow: 0 0 0 3px rgba(74,222,128,0.12); }
  .presence-dot.offline { background: #6b7280; }

  /* INPUT */
  .input-bar { padding: 16px 28px; border-top: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
  .file-preview { display: none; align-items: center; gap: 10px; padding: 8px 12px; background: var(--hover); border: 1px solid var(--border); border-radius: 8px; font-size: 13px; margin-bottom: 8px; }
  .file-preview.show { display: flex; }
  .file-preview .preview-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); }
  .file-preview .clear-file { cursor: pointer; color: var(--muted); font-size: 16px; }
  .file-preview .clear-file:hover { color: #f87171; }
  .input-inner { display: flex; align-items: center; gap: 8px; background: var(--hover); border: 1px solid var(--border); border-radius: 10px; padding: 4px 4px 4px 16px; transition: border-color 0.15s; }
  .input-inner:focus-within { border-color: rgba(212,245,60,0.4); }
  .input-inner input { flex: 1; background: none; border: none; outline: none; color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; padding: 8px 0; }
  .input-inner input::placeholder { color: var(--muted); }
  .attach-btn { width: 36px; height: 36px; border-radius: 8px; background: none; border: 1px solid var(--border); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; color: var(--muted); transition: all 0.15s; }
  .attach-btn:hover { background: var(--border); color: var(--text); }
  .send-btn { width: 38px; height: 38px; background: var(--accent); border: none; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; color: #0f1013; transition: opacity 0.15s, transform 0.1s; }
  .send-btn:hover { opacity: 0.88; transform: scale(1.04); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* LIGHTBOX */
  .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 999; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
  .lightbox.show { display: flex; }
  .lightbox img { max-width: 90vw; max-height: 80vh; border-radius: 8px; cursor: default; }
  .lightbox-actions { display: flex; gap: 12px; }
  .lightbox-close {
    padding: 8px 20px; border-radius: 8px;
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
    color: #fff; font-size: 13px; cursor: pointer;
    font-family: 'Inter', sans-serif; transition: background 0.15s;
  }
  .lightbox-close:hover { background: rgba(255,255,255,0.18); }
  .lightbox-dl {
    padding: 8px 20px; border-radius: 8px;
    background: var(--accent); border: none;
    color: #0f1013; font-family: 'Syne', sans-serif;
    font-weight: 700; font-size: 13px; cursor: pointer;
    text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
    transition: opacity 0.15s;
  }
  .lightbox-dl:hover { opacity: 0.88; }

  @keyframes msgIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>
<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <a href="/home" class="logo"><div class="logo-dot"></div>NTU CHAT</a>
    <div class="user-block">
      <div class="label">Sinh viên</div>
      <div class="mssv" th:text="${sv.mssv}">22521234</div>
      <div class="name" th:text="${sv.hoTen}">Nguyễn Văn A</div>
    </div>
    <div class="nav-label">Điều hướng</div>
    <a href="/home"    class="nav-link"><span class="icon">⊞</span> Tổng quan</a>
    <a href="/friends" class="nav-link"><span class="icon">＋</span> Kết bạn</a>
    <div class="nav-label">Phòng nhóm</div>
    <th:block th:each="r : ${rooms}">
      <a th:href="@{/room/{id}(id=${r.id})}" class="nav-link"
         th:data-room="${r.id}"
         th:classappend="${r.id == room.id} ? ' active' : ''">
        <span class="icon">#</span>
        <span class="nav-text" th:text="${r.tenRoom}"></span>
        <span class="unread-badge" th:attr="data-badge-room=${r.id}">0</span>
      </a>
    </th:block>
    <div class="nav-label">Chat riêng</div>
    <th:block th:each="r : ${privateRooms}">
      <a th:href="@{/room/{id}(id=${r.id})}" class="nav-link"
         th:data-room="${r.id}"
         th:data-user="${r.user1.mssv == sv.mssv ? r.user2.mssv : r.user1.mssv}"
         th:classappend="${r.id == room.id} ? ' active-private' : ''">
        <span class="icon">@</span>
        <span class="presence-dot"
              th:classappend="${r.user1.mssv == sv.mssv ? r.user2.online : r.user1.online} ? ' online' : ' offline'"></span>
 <span
      th:text="${r.user1.mssv == sv.mssv ? r.user2.hoTen : r.user1.hoTen}"
      class="nav-text">
    </span>
        <span class="presence-state"
              th:classappend="${r.user1.mssv == sv.mssv ? r.user2.online : r.user1.online} ? ' online' : ' offline'"
              th:text="${r.user1.mssv == sv.mssv ? (r.user2.online ? 'Online' : 'Offline') : (r.user1.online ? 'Online' : 'Offline')}">Offline</span>
        <span class="unread-badge" th:attr="data-badge-room=${r.id}">0</span>
      </a>
    </th:block>
    <div class="spacer"></div>
    <div class="online-badge"><div class="dot"></div>Đang hoạt động</div>
  </aside>

  <!-- CHAT AREA -->
  <div class="chat-area">
    <div class="chat-header">
      <div class="hash">#</div>
      <div class="room-title"
           th:text="${room.loaiRoom == 'PRIVATE' ? (room.user1.mssv == sv.mssv ? room.user2.hoTen : room.user1.hoTen) : room.tenRoom}">Tên phòng</div>
      <div class="header-status"><div class="dot"></div>Online</div>
    </div>

    <div id="messages">
      <div class="date-divider"><span>Hôm nay</span></div>

      <th:block th:each="msg : ${messages}">
        <div class="msg-row gap-top"
             th:classappend="${msg.nguoiGui.mssv == sv.mssv} ? 'me' : 'other'">

          <div class="msg-sender"
               th:text="${msg.nguoiGui.hoTen}"
               th:if="${msg.nguoiGui.mssv != sv.mssv}"></div>

          <!-- Text -->
          <div class="msg-bubble"
               th:if="${msg.noiDung != null and !#strings.isEmpty(msg.noiDung)}"
               th:text="${msg.noiDung}"></div>

          <!-- Ảnh + nút download hover -->
          <div class="msg-image-wrap" th:if="${msg.fileType == 'IMAGE'}">
            <img th:src="${msg.fileUrl}" th:alt="${msg.fileName}"
                 class="msg-image"
                 th:attr="data-url=${msg.fileUrl}, data-name=${msg.fileName}"
                 onclick="openLightbox(this.dataset.url, this.dataset.name)" />
            <a class="img-download-btn"
               th:href="${msg.fileUrl}"
               th:attr="download=${msg.fileName}"
               onclick="event.stopPropagation()">
              ↓ Tải xuống
            </a>
          </div>

          <!-- File + nút download -->
          <div class="msg-file" th:if="${msg.fileType == 'FILE'}">
            <span class="file-icon">📎</span>
            <div class="file-info">
              <div class="file-name" th:text="${msg.fileName}">file</div>
              <div class="file-sub">Nhấn ↓ để tải xuống</div>
            </div>
            <a class="file-dl"
               th:href="${msg.fileUrl}"
               th:attr="download=${msg.fileName}"
               target="_blank"
               title="Tải xuống">↓</a>
          </div>

          <div class="msg-time"
               th:attr="data-time=${msg.thoiGian}"
               th:text="${msg.thoiGian}">00:00</div>
          <div class="seen-marker"
               th:if="${msg.nguoiGui.mssv == sv.mssv}"
               th:classappend="${msg.seen} ? ' show' : ''">Da xem</div>
        </div>
      </th:block>
    </div>

    <!-- INPUT -->
    <div class="input-bar">
      <div class="file-preview" id="filePreview">
        <span>📎</span>
        <span class="preview-name" id="previewName"></span>
        <span class="clear-file" onclick="clearFile()">✕</span>
      </div>
      <div class="input-inner">
        <input type="text" id="noiDung" placeholder="Nhập tin nhắn…" autocomplete="off"
               onkeydown="if(event.key==='Enter') sendText()" />
        <button type="button" class="attach-btn" onclick="document.getElementById('fileInput').click()">📎</button>
        <input type="file" id="fileInput" style="display:none"
               accept=".jpg,.jpeg,.png,.pdf,.docx,.zip"
               onchange="handleFileSelect(this)" />
        <button type="button" class="send-btn" id="sendBtn" onclick="handleSend()">↑</button>
      </div>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightboxImg" src="" alt="" onclick="event.stopPropagation()" />
  <div class="lightbox-actions" onclick="event.stopPropagation()">
    <a class="lightbox-dl" id="lightboxDl" href="#" download>↓ Tải xuống</a>
    <button class="lightbox-close" onclick="closeLightbox()">✕ Đóng</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script th:inline="javascript">
  const roomId = /*[[${room.id}]]*/ 0;
  const myMssv = /*[[${sv.mssv}]]*/ "";
  const myName = /*[[${sv.hoTen}]]*/ "";
  const currentRoomType = /*[[${room.loaiRoom}]]*/ "";
  const sidebarRoomIds = (/*[[${sidebarRoomIds}]]*/ []) || [];
  const unreadPrefix = 'chatUnread:';
  const recentlyCounted = new Set();
  const presenceClientId = 'room-' + roomId + '-' + Date.now() + '-' + Math.random().toString(36).slice(2);

  let stompClient = null;
  let selectedFile = null;

  function connect() {
    const socket = new SockJS('/chat');
    stompClient = Stomp.over(socket);
    stompClient.debug = null;
    stompClient.connect({}, function() {
      stompClient.send('/app/presence', {}, JSON.stringify({mssv: myMssv, online: true, clientId: presenceClientId}));
      stompClient.subscribe('/topic/room/' + roomId, function(msg) {
        const data = JSON.parse(msg.body);
        renderMessage(data);
        if (data.nguoiGuiMssv !== myMssv) markSeen();
      });
      stompClient.subscribe('/topic/room/' + roomId + '/seen', function(msg) {
        const data = JSON.parse(msg.body);
        if (data.viewerMssv !== myMssv) showSeenMarkers();
      });
      stompClient.subscribe('/topic/presence', function(msg) {
        const data = JSON.parse(msg.body);
        updatePresence(data.mssv, data.online);
      });
      subscribeVisibleRooms();
      stompClient.subscribe('/topic/notify/' + myMssv, function(msg) {
        const data = JSON.parse(msg.body);
        if (data.type === 'MESSAGE' && data.roomId !== roomId) {
          pollUnreadCounts();
          showToast(data.senderName + ': ' + data.preview, '/room/' + data.roomId);
        }
        if (data.type === 'FRIEND_REQUEST') showToast(data.senderName + ' da gui loi moi ket ban', '/friends');
      });
      markSeen();
      refreshRelativeTimes();
      scrollBottom();
    });
  }

  function handleSend() {
    selectedFile ? uploadAndSend() : sendText();
  }

  function sendText() {
    const input = document.getElementById('noiDung');
    const text = input.value.trim();
    if (!text) return;
    if (!stompClient || !stompClient.connected) {
      connect();
      showToast('Dang ket noi lai, vui long gui lai sau vai giay');
      return;
    }
    stompClient.send('/app/sendMessage', {}, JSON.stringify({
      roomId: roomId, nguoiGui: myMssv, noiDung: text
    }));
    input.value = '';
    input.focus();
  }

  function uploadAndSend() {
    if (!selectedFile) return;
    if (!stompClient || !stompClient.connected) {
      connect();
      showToast('Dang ket noi lai, vui long gui lai sau vai giay');
      return;
    }
    const btn = document.getElementById('sendBtn');
    btn.disabled = true;
    const formData = new FormData();
    formData.append('file', selectedFile);
    fetch('/room/' + roomId + '/upload', { method: 'POST', body: formData })
      .then(res => {
        if (!res.ok) {
          if (res.status === 413) throw new Error('File vượt quá 10MB');
          if (res.status === 415) throw new Error('Chỉ hỗ trợ jpg, png, pdf, docx, zip');
          throw new Error('Upload thất bại');
        }
        return res.json();
      })
      .then(dto => {
        stompClient.send('/app/sendMessage', {}, JSON.stringify({
          roomId: roomId, nguoiGui: myMssv, noiDung: '',
          fileUrl: dto.fileUrl, fileName: dto.fileName, fileType: dto.fileType
        }));
        clearFile();
      })
      .catch(err => showToast(err.message || 'Upload lỗi'))
      .finally(() => { btn.disabled = false; });
  }

  function renderMessage(msg) {
    const box  = document.getElementById('messages');
    const isMe = msg.nguoiGui === myMssv || msg.nguoiGui === myName;

    const row = document.createElement('div');
    row.className = 'msg-row gap-top ' + (isMe ? 'me' : 'other');
    row.dataset.sender = msg.nguoiGuiMssv || (isMe ? myMssv : '');

    if (!isMe) {
      const sender = document.createElement('div');
      sender.className = 'msg-sender';
      sender.textContent = msg.nguoiGui;
      row.appendChild(sender);
    }

    if (msg.noiDung && msg.noiDung.trim()) {
      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.textContent = msg.noiDung;
      row.appendChild(bubble);
    }

    // Ảnh + nút download hover
    if (msg.fileType === 'IMAGE' && msg.fileUrl) {
      const wrap = document.createElement('div');
      wrap.className = 'msg-image-wrap';

      const img = document.createElement('img');
      img.src = msg.fileUrl;
      img.className = 'msg-image';
      img.onclick = () => openLightbox(msg.fileUrl, msg.fileName);
      wrap.appendChild(img);

      const dlBtn = document.createElement('a');
      dlBtn.className = 'img-download-btn';
      dlBtn.href = msg.fileUrl;
      dlBtn.download = msg.fileName || 'image';
      dlBtn.textContent = '↓ Tải xuống';
      dlBtn.onclick = e => e.stopPropagation();
      wrap.appendChild(dlBtn);

      row.appendChild(wrap);
    }

    // File + nút download
    if (msg.fileType === 'FILE' && msg.fileUrl) {
      const fileDiv = document.createElement('div');
      fileDiv.className = 'msg-file';
      fileDiv.innerHTML = `
        <span class="file-icon">📎</span>
        <div class="file-info">
          <div class="file-name">${msg.fileName || 'file'}</div>
          <div class="file-sub">Nhấn ↓ để tải xuống</div>
        </div>
        <a class="file-dl" href="${msg.fileUrl}" download="${msg.fileName || 'file'}"
           target="_blank" title="Tải xuống">↓</a>
      `;
      row.appendChild(fileDiv);
    }

    const time = document.createElement('div');
    time.className = 'msg-time';
    const now = new Date();
    time.dataset.time = now.toISOString();
    time.textContent = formatRelativeTime(now);
    row.appendChild(time);

    if (isMe) {
      const seen = document.createElement('div');
      seen.className = 'seen-marker';
      seen.textContent = 'Da xem';
      row.appendChild(seen);
    }

    box.appendChild(row);
    scrollBottom();
  }

  function markSeen() {
    if (stompClient && stompClient.connected) {
      stompClient.send('/app/seen', {}, JSON.stringify({roomId: String(roomId), viewerMssv: myMssv}));
    }
  }

  function formatRelativeTime(value) {
    const date = value instanceof Date ? value : new Date(value);
    if (Number.isNaN(date.getTime())) return '';

    const diffMs = Date.now() - date.getTime();
    const diffMinutes = Math.max(0, Math.floor(diffMs / 60000));
    if (diffMinutes < 1) return 'vừa xong';
    if (diffMinutes < 60) return diffMinutes + ' phút trước';

    const diffHours = Math.floor(diffMinutes / 60);
    if (diffHours < 24) return diffHours + ' tiếng trước';

    const diffDays = Math.floor(diffHours / 24);
    if (diffDays < 30) return diffDays + ' ngày trước';

    const diffMonths = Math.floor(diffDays / 30);
    if (diffMonths < 12) return diffMonths + ' tháng trước';

    const diffYears = Math.floor(diffDays / 365);
    return diffYears + ' năm trước';
  }

  function refreshRelativeTimes() {
    document.querySelectorAll('.msg-time[data-time]').forEach(item => {
      item.textContent = formatRelativeTime(item.dataset.time);
    });
  }

  function showSeenMarkers() {
    document.querySelectorAll('.msg-row.me .seen-marker').forEach(el => el.classList.add('show'));
  }

  function updatePresence(mssv, online) {
    document.querySelectorAll('[data-user="' + mssv + '"] .presence-dot').forEach(dot => {
      dot.classList.toggle('online', online);
      dot.classList.toggle('offline', !online);
    });
    document.querySelectorAll('[data-user="' + mssv + '"] .presence-state').forEach(state => {
      state.textContent = online ? 'Online' : 'Offline';
      state.classList.toggle('online', online);
      state.classList.toggle('offline', !online);
    });
  }

  function setUnread(roomIdValue, count) {
    const cappedCount = Math.min(count, 5);
    document.querySelectorAll('[data-badge-room="' + roomIdValue + '"]').forEach(badge => {
      badge.textContent = '+' + cappedCount;
      badge.classList.toggle('show', count > 0);
    });
    document.querySelectorAll('[data-room="' + roomIdValue + '"]').forEach(link => {
      link.classList.toggle('has-unread', count > 0);
    });
  }

  function markRoomUnread(roomIdValue, eventKey) {
    if (eventKey && recentlyCounted.has(eventKey)) return;
    if (eventKey) {
      recentlyCounted.add(eventKey);
      setTimeout(() => recentlyCounted.delete(eventKey), 3000);
    }
    const key = unreadPrefix + roomIdValue;
    const count = Math.min(parseInt(localStorage.getItem(key) || '0', 10) + 1, 5);
    localStorage.setItem(key, String(count));
    setUnread(roomIdValue, count);
  }

  function subscribeVisibleRooms() {
    const roomIds = new Set((sidebarRoomIds || []).map(id => String(id)));
    roomIds.delete(String(roomId));

    roomIds.forEach(sidebarRoomId => {
      stompClient.subscribe('/topic/room/' + sidebarRoomId, frame => {
        const data = JSON.parse(frame.body);
        const sender = data.nguoiGuiMssv || data.nguoiGui;
        const isMine = sender === myMssv || sender === myName;
        if (!isMine) {
          pollUnreadCounts();
          showToast((data.nguoiGui || 'Tin nhan moi') + ': ' + (data.noiDung || data.fileName || 'File moi'), '/room/' + sidebarRoomId);
        }
      });
    });
  }

  function getSidebarRoomIds() {
    const ids = new Set((sidebarRoomIds || []).map(id => String(id)));
    document.querySelectorAll('[data-badge-room]').forEach(badge => ids.add(String(badge.dataset.badgeRoom)));
    return Array.from(ids).filter(Boolean);
  }

  function getSidebarUserIds() {
    const ids = new Set();
    document.querySelectorAll('[data-user]').forEach(item => ids.add(String(item.dataset.user)));
    return Array.from(ids).filter(Boolean);
  }

  function pollUnreadCounts() {
    const ids = getSidebarRoomIds();
    if (ids.length === 0) return;
    fetch('/api/sidebar/unread?roomIds=' + encodeURIComponent(ids.join(',')))
      .then(res => res.ok ? res.json() : {})
      .then(data => {
        ids.forEach(sidebarRoomId => {
          const serverCount = Number(data[sidebarRoomId] || 0);
          const count = sidebarRoomId === String(roomId) ? 0 : serverCount;
          localStorage.setItem(unreadPrefix + sidebarRoomId, String(Math.min(count, 5)));
          setUnread(sidebarRoomId, count);
        });
      })
      .catch(() => {});
  }

  function sendHeartbeat() {
    fetch('/api/presence/heartbeat?clientId=' + encodeURIComponent(presenceClientId), { method: 'POST' }).catch(() => {});
  }

  function sendOffline() {
    const url = '/api/presence/offline?clientId=' + encodeURIComponent(presenceClientId);
    if (navigator.sendBeacon) {
      navigator.sendBeacon(url);
    } else {
      fetch(url, { method: 'POST', keepalive: true }).catch(() => {});
    }
  }

  function pollPresence() {
    const ids = getSidebarUserIds();
    if (ids.length === 0) return;
    fetch('/api/sidebar/presence?mssvs=' + encodeURIComponent(ids.join(',')))
      .then(res => res.ok ? res.json() : {})
      .then(data => {
        ids.forEach(mssv => updatePresence(mssv, Boolean(data[mssv])));
      })
      .catch(() => {});
  }

  function postCurrentRoomSeen() {
    fetch('/api/room/' + roomId + '/seen', { method: 'POST' })
      .then(res => res.ok ? res : fetch('/api/room/' + roomId + '/seen'))
      .then(() => {
        clearCurrentRoomUnread();
        pollUnreadCounts();
      })
      .catch(() => {});
  }

  function loadUnreadBadges() {
    document.querySelectorAll('[data-badge-room]').forEach(badge => {
      const badgeRoomId = badge.dataset.badgeRoom;
      setUnread(badgeRoomId, parseInt(localStorage.getItem(unreadPrefix + badgeRoomId) || '0', 10));
    });
  }

  function clearCurrentRoomUnread() {
    localStorage.removeItem(unreadPrefix + roomId);
    setUnread(roomId, 0);
  }

  function showToast(msg, url) {
    let toast = document.getElementById('__toast__');
    if (!toast) {
      toast = document.createElement('div');
      toast.id = '__toast__';
      toast.style.cssText = 'position:fixed;right:24px;bottom:24px;z-index:9999;background:#1e2128;border:1px solid rgba(212,245,60,.35);color:#e8eaf0;padding:12px 16px;border-radius:10px;font-size:13px;max-width:320px;cursor:pointer;box-shadow:0 8px 30px rgba(0,0,0,.35);opacity:0;transition:opacity .2s';
      document.body.appendChild(toast);
    }
    toast.textContent = msg;
    toast.onclick = () => { if (url) location.href = url; };
    toast.style.opacity = '1';
    clearTimeout(toast._timer);
    toast._timer = setTimeout(() => toast.style.opacity = '0', 4500);
  }

  function handleFileSelect(input) {
    if (input.files && input.files[0]) {
      const file = input.files[0];
      const allowed = ['jpg', 'jpeg', 'png', 'pdf', 'docx', 'zip'];
      const extension = (file.name.split('.').pop() || '').toLowerCase();
      if (!allowed.includes(extension)) {
        showToast('Chỉ hỗ trợ jpg, png, pdf, docx, zip');
        clearFile();
        return;
      }
      if (file.size > 10 * 1024 * 1024) {
        showToast('File không được vượt quá 10MB');
        clearFile();
        return;
      }
      selectedFile = file;
      document.getElementById('previewName').textContent = selectedFile.name;
      document.getElementById('filePreview').classList.add('show');
    }
  }

  function clearFile() {
    selectedFile = null;
    document.getElementById('fileInput').value = '';
    document.getElementById('filePreview').classList.remove('show');
    document.getElementById('previewName').textContent = '';
  }

  function openLightbox(src, fileName) {
    document.getElementById('lightboxImg').src = src;
    const dl = document.getElementById('lightboxDl');
    dl.href = src;
    dl.download = fileName || 'image';
    document.getElementById('lightbox').classList.add('show');
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('show');
  }

  function scrollBottom() {
    const box = document.getElementById('messages');
    box.scrollTop = box.scrollHeight;
  }

  loadUnreadBadges();
  clearCurrentRoomUnread();
  refreshRelativeTimes();
  sendHeartbeat();
  postCurrentRoomSeen();
  pollUnreadCounts();
  pollPresence();
  setInterval(pollUnreadCounts, 2500);
  setInterval(pollPresence, 4000);
  setInterval(refreshRelativeTimes, 60000);
  setInterval(sendHeartbeat, 10000);
  window.addEventListener('pagehide', sendOffline);
  connect();
</script>
</body>
</html>
