<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng nhập</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1013;
    --surface: #16181d;
    --panel: #13151a;
    --border: #22252e;
    --accent: #d4f53c;
    --text: #e8eaf0;
    --muted: #6b7280;
    --hover: #1e2128;
    --danger: #f87171;
  }
  html, body { min-height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    display: grid;
    place-items: center;
    padding: 28px;
  }
  .login-shell {
    width: min(880px, 100%);
    min-height: 520px;
    display: grid;
    grid-template-columns: 1fr 400px;
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 24px 80px rgba(0,0,0,0.36);
  }
  .brand-panel {
    padding: 40px;
    border-right: 1px solid var(--border);
    background: var(--panel);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .logo {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 800;
    text-decoration: none;
  }
  .logo-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); }
  .brand-copy h1 {
    max-width: 360px;
    font-family: 'Syne', sans-serif;
    font-size: 42px;
    line-height: 1.04;
    margin-bottom: 14px;
  }
  .brand-copy p {
    max-width: 340px;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.7;
  }
  .status-line {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: var(--muted);
    font-size: 12px;
  }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }
  .form-panel {
    padding: 42px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .form-head { margin-bottom: 26px; }
  .form-title {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    margin-bottom: 6px;
  }
  .form-sub { color: var(--muted); font-size: 13px; }
  .error {
    display: none;
    margin-bottom: 16px;
    padding: 10px 12px;
    border: 1px solid rgba(248,113,113,0.28);
    background: rgba(248,113,113,0.1);
    color: var(--danger);
    border-radius: 8px;
    font-size: 13px;
  }
  .error:not(:empty) { display: block; }
  .field { margin-bottom: 14px; }
  .field label {
    display: block;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    margin-bottom: 7px;
    font-weight: 600;
  }
  .field input {
    width: 100%;
    height: 44px;
    background: var(--hover);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 0 13px;
    outline: none;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    transition: border-color 0.15s, background 0.15s;
  }
  .field input:focus {
    border-color: rgba(212,245,60,0.45);
    background: #20242c;
  }
  .submit-btn {
    width: 100%;
    height: 44px;
    margin-top: 8px;
    border: none;
    border-radius: 8px;
    background: var(--accent);
    color: #0f1013;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  .submit-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  @media (max-width: 760px) {
    body { padding: 16px; place-items: stretch; }
    .login-shell { min-height: auto; grid-template-columns: 1fr; }
    .brand-panel { min-height: 230px; border-right: 0; border-bottom: 1px solid var(--border); padding: 28px; }
    .brand-copy h1 { font-size: 32px; }
    .form-panel { padding: 28px; }
  }
</style>
</head>
<body>
<main class="login-shell">
  <section class="brand-panel">
    <a href="/login" class="logo"><span class="logo-dot"></span>NTU CHAT</a>
    <div class="brand-copy">
      <h1>Trò chuyện sinh viên</h1>
      <p>Đăng nhập để tiếp tục vào phòng chat của bạn.</p>
    </div>
    <div class="status-line"><span class="status-dot"></span>Đang hoạt động</div>
  </section>

  <section class="form-panel">
    <div class="form-head">
      <div class="form-title">Đăng nhập</div>
      <div class="form-sub">Nhập MSSV và mật khẩu.</div>
    </div>

    <p class="error" th:text="${error}"></p>

    <form method="post">
      <div class="field">
        <label for="mssv">MSSV</label>
        <input id="mssv" type="text" name="mssv" autocomplete="username" autofocus>
      </div>
      <div class="field">
        <label for="password">Mật khẩu</label>
        <input id="password" type="password" name="password" autocomplete="current-password">
      </div>
      <button type="submit" class="submit-btn">Đăng nhập</button>
    </form>
  </section>
</main>
</body>
</html>
